global:
  scrape_interval: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: shop-local
    env: dev

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:4000"]
        labels:
          service: backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # MySQL-side metrics from the official mysqld-exporter. Gives us QPS,
  # connections, buffer pool, slow queries, InnoDB row ops — the "from MySQL's
  # perspective" view that the app-side db_query_* metrics can't see.
  - job_name: mysql
    static_configs:
      - targets: ["mysqld-exporter:9104"]
        labels:
          service: mysql
