global:
  scrape_interval: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: shop-local
    env: dev

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:4000"]
        labels:
          service: backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
