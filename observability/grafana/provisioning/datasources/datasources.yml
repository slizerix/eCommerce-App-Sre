apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true
    editable: false

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    uid: elasticsearch
    database: "shop-logs-*"
    jsonData:
      index: "shop-logs-*"
      timeField: "@timestamp"
      esVersion: "8.0.0"
      logMessageField: msg
      logLevelField: level
    editable: false
