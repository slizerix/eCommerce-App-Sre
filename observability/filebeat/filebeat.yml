filebeat.autodiscover:
  providers:
    - type: docker
      templates:
        # Match the backend container by name. Simpler and more robust than
        # autodiscover hints across Filebeat 7/8 — label-key sanitization
        # rules between versions are surprisingly fiddly.
        - condition:
            equals:
              docker.container.name: shop-backend
          config:
            - type: container
              stream: stdout
              paths:
                - /var/lib/docker/containers/${data.docker.container.id}/*.log
              json.keys_under_root: true
              json.add_error_key: true
              json.overwrite_keys: true
              processors:
                - add_fields:
                    target: ""
                    fields:
                      container_name: ${data.docker.container.name}

# Strip noisy Docker/host metadata. We only keep what's useful for searching.
processors:
  - drop_fields:
      fields: ["agent", "ecs", "host", "input", "log.offset", "stream"]
      ignore_missing: true

# Single index per day. The AI service searches the `shop-logs-*` alias.
output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "shop-logs-%{+yyyy.MM.dd}"

# Disable Filebeat's bundled ECS template + ILM data streams. With ECS
# enabled, our pino fields `event` / `error` get rejected because ECS
# pre-declares them as objects — and our log lines send them as strings.
# Letting ES use plain dynamic mapping with our explicit template instead
# keeps the integration cardinality-disciplined without ECS landmines.
setup.template.enabled: false
setup.ilm.enabled: false

logging.level: info
logging.to_files: false
